    <!-- إضافة مكتبات Firebase المطلوبة للرفع -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // نفس إعدادات مشروعك في Firebase لربط الـ Storage
        const firebaseConfig = {
            apiKey: "AIzaSyCNR11GVPimbP_p-cT-EIBn0AzOd05_Np0",
            authDomain: "dzair-booking.firebaseapp.com",
            projectId: "dzair-booking",
            storageBucket: "dzair-booking.firebasestorage.app",
            messagingSenderId: "1004941084286",
            appId: "1:1004941084286:web:329aa5fb5c3f4e7e603a2f",
            measurementId: "G-RRYDNFZT6N"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        let sessionData = JSON.parse(localStorage.getItem('visaBooking')) || { pax: 1, allTravelers: [] };
        if (!sessionData.allTravelers) sessionData.allTravelers = [];
        
        let totalPax = parseInt(sessionData.pax) || 1;
        let currentPaxIndex = 1;

        // متغيرات مؤقتة لحفظ روابط الملفات المرفوعة للمسافر الحالي
        let currentPassportUrl = "";
        let currentPhotoUrl = "";

        window.onload = () => { updateTitle(); };

        window.updateTitle = function() {
            const titleElement = document.getElementById('passengerTitle');
            const subTitle = document.getElementById('subTitle');
            const btnText = document.getElementById('btnText');
            
            const indexStr = String(currentPaxIndex).padStart(2, '0');
            document.getElementById('sectionTitleCivil').innerHTML = `<i class="fas fa-user-circle mr-3 text-pink-600 text-lg"></i> ${indexStr}. État Civil du Voyageur`;
            document.getElementById('sectionTitleDoc').innerHTML = `<i class="fas fa-passport mr-3 text-pink-600 text-lg"></i> ${indexStr}. Détails du Document`;
            document.getElementById('sectionTitleUpload').innerHTML = `<i class="fas fa-file-upload mr-3 text-pink-600 text-lg"></i> ${indexStr}. Documents (Max 10MB)`;

            if (totalPax > 1) {
                titleElement.innerHTML = `Information du Passager <span class="text-pink-600">${indexStr}</span>`;
                subTitle.innerText = `Voyageur ${currentPaxIndex} sur ${totalPax}`;
                btnText.innerText = currentPaxIndex === totalPax ? "Finaliser la Demande" : "Passager Suivant";
            } else {
                titleElement.innerHTML = `Information du Passager`;
                subTitle.innerText = "Remplissage obligatoire de tous les champs";
                btnText.innerText = "Prochaine Étape";
            }
        }

        // دالة الرفع التلقائي والحصول على الرابط
        window.validateFile = async function(input, boxId) {
            const box = document.getElementById(boxId);
            const file = input.files[0];
            const allowedTypes = ['application/pdf', 'image/jpeg', 'image/png', 'image/jpg'];
            const maxSize = 10 * 1024 * 1024;

            if (file) {
                if (allowedTypes.includes(file.type) && file.size <= maxSize) {
                    // إظهار حالة جاري الرفع مؤقتاً
                    box.className = "upload-box";
                    box.querySelector('p').innerText = "Téléchargement en cours... ⏳";
                    box.querySelector('i').className = "fas fa-spinner fa-spin text-2xl mb-2 text-blue-500";

                    try {
                        // إنشاء مسار فريد للملف في الـ Storage
                        const fileExtension = file.name.split('.').pop();
                        const uniqueFileName = `${Date.now()}_${Math.floor(Math.random() * 1000)}.${fileExtension}`;
                        const folder = boxId === 'box-pass' ? 'passports' : 'photos';
                        const storageRef = ref(storage, `${folder}/${uniqueFileName}`);

                        // رفع الملف
                        const snapshot = await uploadBytes(storageRef, file);
                        const downloadURL = await getDownloadURL(snapshot.ref);

                        // حفظ الرابط بالمتغيرات المؤقتة
                        if (boxId === 'box-pass') {
                            currentPassportUrl = downloadURL;
                        } else {
                            currentPhotoUrl = downloadURL;
                        }

                        // تغيير الواجهة إلى نجاح
                        box.className = "upload-box upload-success";
                        box.querySelector('p').innerText = "Fichier validé ✔";
                        box.querySelector('i').className = "fas fa-check-circle text-2xl mb-2 text-green-500";
                    } catch (error) {
                        console.error("Error uploading file: ", error);
                        box.className = "upload-box upload-error";
                        box.querySelector('p').innerText = "Erreur de connexion ✖";
                        box.querySelector('i').className = "fas fa-exclamation-triangle text-2xl mb-2 text-red-500";
                        alert("Erreur lors du téléchargement du fichier vers le serveur.");
                    }
                } else {
                    box.className = "upload-box upload-error";
                    box.querySelector('p').innerText = "Fichier non valide ✖";
                    box.querySelector('i').className = "fas fa-times-circle text-2xl mb-2 text-red-500";
                    input.value = ""; 
                    alert("Erreur: Le fichier doit être PDF/JPG/PNG (Max 10MB).");
                }
            }
        }

        window.validateForm = function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const confirmEmail = document.getElementById('confirmEmail').value;
            const emailError = document.getElementById('emailError');

            if (email !== confirmEmail) {
                document.getElementById('confirmEmail').classList.add('input-error');
                emailError.classList.remove('hidden');
                alert("Erreur: Les adresses email ne correspondent pas.");
                return false;
            } else {
                document.getElementById('confirmEmail').classList.remove('input-error');
                emailError.classList.add('hidden');
            }

            // التحقق من وجود الروابط الفعلية المرفوعة
            if (!currentPassportUrl || !currentPhotoUrl) {
                alert("Attention! Veuillez attendre la fin du téléchargement sécurisé des documents.");
                if(!currentPassportUrl) document.getElementById('box-pass').classList.add('upload-error');
                if(!currentPhotoUrl) document.getElementById('box-photo').classList.add('upload-error');
                return false;
            }

            // تجميع البيانات شاملة روابط الملفات المستخرجة من الـ Storage
            const travelerData = {
                id: currentPaxIndex,
                nom: document.getElementById('lastName').value.toUpperCase(),
                prenom: document.getElementById('firstName').value.toUpperCase(),
                email: email,
                birthDate: document.getElementById('birthDate').value,
                gender: document.getElementById('gender').value,
                passport: document.getElementById('passportNum').value.toUpperCase(),
                authority: document.getElementById('authority').value.toUpperCase(),
                issueDate: document.getElementById('issueDate').value,
                expiryDate: document.getElementById('expiryDate').value,
                passportFileUrl: currentPassportUrl, // الرابط المباشر للجواز المرفوع
                photoFileUrl: currentPhotoUrl      // الرابط المباشر للصورة المرفوعة
            };

            const existingIndex = sessionData.allTravelers.findIndex(t => t.id === currentPaxIndex);
            if (existingIndex !== -1) {
                sessionData.allTravelers[existingIndex] = travelerData;
            } else {
                sessionData.allTravelers.push(travelerData);
            }

            if (currentPaxIndex < totalPax) {
                currentPaxIndex++;
                prepareNextForm();
            } else {
                localStorage.setItem('visaBooking', JSON.stringify(sessionData));
                window.location.href = "visa-review.html";
            }
        }

        function prepareNextForm() {
            // تصفير روابط المسافر الحالي استعداداً للتالي
            currentPassportUrl = "";
            currentPhotoUrl = "";

            updateTitle();
            document.getElementById('visaForm').reset();
            
            const resetBox = (id, iconClass, text) => {
                const box = document.getElementById(id);
                box.className = "upload-box";
                box.querySelector('i').className = iconClass;
                box.querySelector('p').innerText = text;
            };
            
            resetBox('box-pass', "fas fa-id-card text-2xl text-gray-300 mb-2", "Scan du Passeport *");
            resetBox('box-photo', "fas fa-camera text-2xl text-gray-300 mb-2", "Photo d'identité *");

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
